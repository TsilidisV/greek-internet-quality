name: Daily Pipeline

on:
  schedule:
    # At 04:14 UTC, on day 1 of the month 
    - cron: '14 4 1 * *'
  workflow_dispatch:

# This is required for Workload Identity Federation to work.
permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      GCP_PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION:      ${{ secrets.GCP_REGION }}
      JOB_NAME:        ${{ secrets.JOB_NAME }}

    steps:
      - uses: actions/checkout@v4
      
      # 1. Authenticate with GCP using Workload Identity Federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Set up the gcloud CLI
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Sync dependencies
        run: uv --directory ingest sync --frozen
        
      - name: Ingest Data
        # Because we authenticated above, Python's Google Cloud libraries 
        # automatically pick up the credentials via Application Default Credentials (ADC).
        run: uv run --directory ingest python -m src.main monthly

      # 3. Trigger the Cloud Run Job
      - name: Trigger ETL Cloud Run Job
        run: |
          gcloud run jobs execute ${{ env.JOB_NAME }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --wait