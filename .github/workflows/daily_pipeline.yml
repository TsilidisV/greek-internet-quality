name: Daily Pipeline

on:
  schedule:
    - cron: '12 05 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # MOVED UP: Authenticate first so Terraform can access the remote state backend
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.INGESTOR_GCP_KEY }}

      - uses: hashicorp/setup-terraform@v3

      # Initialize Terraform (now has access to GCS backend via auth)
      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init

      - name: Debug Terraform State
        run: |
          cd infrastructure
          terraform output
          
      # Read outputs (now has access to state)
      - name: Get Terraform Outputs
        id: tf-outputs
        run: |
          cd infrastructure
          # Using -raw ensures strict output, but if the value is empty or missing,
          # it still might cause issues. Ensure these outputs exist in your tf files.
          echo "GCS_BUCKET=$(terraform output -raw GCS_BUCKET)" >> $GITHUB_ENV
          echo "GOOGLE_CLOUD_PROJECT=$(terraform output -raw GOOGLE_CLOUD_PROJECT)" >> $GITHUB_ENV
          echo "GCP_REGION=$(terraform output -raw GCP_REGION)" >> $GITHUB_ENV
          echo "CLOUD_RUN_JOB_NAME=$(terraform output -raw CLOUD_RUN_JOB_NAME)" >> $GITHUB_ENV

      # 2. Set up the gcloud CLI (auth is already done, but this sets up the CLI tool)
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Sync dependencies
        run: uv --directory ingest sync --frozen
        
      - name: Ingest Data
        run: uv run --directory ingest main.py daily

      - name: Trigger ETL Cloud Run Job
        run: |
          gcloud run jobs execute ${{ env.CLOUD_RUN_JOB_NAME }} \
            --project=${{ env.GOOGLE_CLOUD_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --wait