name: Daily Pipeline

on:
  schedule:
    # Every day at 05:12 UTC 
    - cron: '12 05 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3

      # Initialize Terraform (requires backend configuration in your tf files)
      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init

      # Read the outputs and save them to the GitHub Environment ($GITHUB_ENV)
      - name: Get Terraform Outputs
        id: tf-outputs
        run: |
          cd infrastructure
          echo "GCS_BUCKET=$(terraform output -raw GCS_BUCKET)" >> $GITHUB_ENV
          echo "GOOGLE_CLOUD_PROJECT=$(terraform output -raw GOOGLE_CLOUD_PROJECT)" >> $GITHUB_ENV
          echo "GCP_REGION=$(terraform output -raw GCP_REGION)" >> $GITHUB_ENV
          echo "CLOUD_RUN_JOB_NAME=$(terraform output -raw CLOUD_RUN_JOB_NAME)" >> $GITHUB_ENV

      # 1. Authenticate with GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.INGESTOR_GCP_KEY }}

      # 2. Set up the gcloud CLI
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Sync dependencies
        run: uv --directory ingest sync --frozen
        
      - name: Ingest Data
        run: uv run --directory ingest main.py daily

      # 3. Trigger the Cloud Run Job
      - name: Trigger ETL Cloud Run Job
        run: |
          gcloud run jobs execute ${{ env.CLOUD_RUN_JOB_NAME }} \
            --project=${{ env.GOOGLE_CLOUD_PROJECT }} \
            --region=${{ env.GCP_REGION }}
            --wait