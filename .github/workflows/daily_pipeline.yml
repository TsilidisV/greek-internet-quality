name: Daily Pipeline

on:
  schedule:
    # Every day at 05:12 UTC 
    - cron: '12 05 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      # It's good practice to set these as env vars
      GCP_PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }} # Replace or use secrets
      GCP_REGION:  ${{ secrets.GCP_REGION }}         # Replace or use secrets
      JOB_NAME:  ${{ secrets.JOB_NAME }}             # Replace with var.job_name value

    steps:
      - uses: actions/checkout@v4
      
      # 1. Authenticate with GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.INGESTOR_GCP_KEY }}

      # 2. Set up the gcloud CLI
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Sync dependencies
        run: uv --directory ingest sync --frozen
        
      - name: Ingest Data
        run: uv run --directory ingest main.py daily

      # 3. Trigger the Cloud Run Job
      - name: Trigger ETL Cloud Run Job
        run: |
          gcloud run jobs execute ${{ env.JOB_NAME }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --wait